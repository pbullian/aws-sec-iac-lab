name: terraform-ci

# Shift-left en CI. El gate bloquea IaC insegura en lo que VOS generás (compute.tf).
# La red (network.tf) se importa "tal cual" y su SSH abierto "por ahora" es un
# ejercicio del lab — eso lo ves localmente con `trivy config .` en CloudShell.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: terraform fmt
        run: terraform fmt -check -recursive

      - name: terraform init
        run: terraform init -backend=false

      - name: terraform validate
        run: terraform validate

      # Gate DURO sobre las máquinas generadas con IA. compute.tf arranca vacío
      # (pasa); cuando agregás instancias inseguras, este paso falla y no mergeás.
      - name: Checkov (gate sobre compute.tf)
        uses: bridgecrewio/checkov-action@master
        with:
          file: compute.tf
          quiet: true
          compact: true
          soft_fail: false
